name: Release

# Tag a version (e.g. `git tag v1.0.1 && git push --tags`) to cross-compile the
# single self-contained `helmsman` binary for every platform and publish it.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all platforms (operator core embedded)
        run: node integration/build-release.js "${{ github.event.inputs.version || github.ref_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Helmsman ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/helmsman-*
            dist/SHA256SUMS.txt
