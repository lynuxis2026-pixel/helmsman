name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # The dashboard is embedded from the committed internal/dashboard/dist, so
      # the Go suite runs everywhere without Node. We still rebuild the web app on
      # Linux to catch dashboard build breakage.
      - name: Set up Node.js
        if: runner.os == 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web
        if: runner.os == 'Linux'
        run: cd web && npm ci && npm run build

      - name: Run Go tests (Linux — race + coverage)
        if: runner.os == 'Linux'
        run: go test ./... -race -coverprofile=coverage.out

      - name: Run Go tests (Windows)
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Upload coverage
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
